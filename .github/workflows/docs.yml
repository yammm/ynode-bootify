name: docs

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v7
              with:
                  node-version: "22"

            - name: Install deps
              run: npm ci

            - name: Build JSDoc
              run: npm run docs

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: ./docs

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
