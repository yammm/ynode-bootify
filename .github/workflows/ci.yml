name: ci

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    verify:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: ["20", "22"]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install deps
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Format check
              run: npm run format:check

            - name: Package dry run
              run: npm pack --dry-run

            - name: Build docs
              if: matrix.node-version == '20'
              run: npm run docs
